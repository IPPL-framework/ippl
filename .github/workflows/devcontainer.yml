name: Dev Container

on:
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "src/**"
      - "test/**"
      - "unit_tests/**"
  push:
    branches:
      - master
      - ippl-container
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "src/**"
      - "test/**"
      - "unit_tests/**"
  workflow_dispatch:

jobs:
  smoke:
    name: Build and smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build devcontainer and run FFT smoke test
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: .devcontainer/scripts/test-smoke.sh
