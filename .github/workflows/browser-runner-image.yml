name: Browser Runner Image

on:
  push:
    branches:
      - ippl-container
    paths:
      - ".dockerignore"
      - ".github/workflows/browser-runner-image.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "src/**"
      - "tools/browser-runner/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/browser-runner/Dockerfile
          push: true
          tags: |
            ghcr.io/ippl-framework/ippl-runner:ippl-container
            ghcr.io/ippl-framework/ippl-runner:latest
